name: Docker

on:
  push:
    branches: [ "master" ]
    # Numeric semver only - rejects typo'd tags like 'vfoo.bar.baz' which would
    # otherwise trigger a release build that emits no tags. The MariaDB version
    # to build is derived from the tag, e.g. v12.0.0 builds MariaDB 12, v11.0.0
    # builds MariaDB 11 (see the "Determine MariaDB version" step).
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
    # Skip the build for changes that can't affect the built image. paths-ignore
    # is OR'd, so a commit touching only these files is skipped; a commit that
    # also touches a build-relevant file still runs.
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  # Manual build of an arbitrary version (smoke test only, never publishes).
  workflow_dispatch:
    inputs:
      mariadb_version:
        description: "MariaDB version to build (e.g. 10, 11, 12, 11.4). Smoke test, no publish."
        required: false
        default: ""

# Cancel superseded in-progress runs on the same branch/PR; never cancel an
# in-flight tag (release) run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # login is only needed when we actually push (on tag pushes); gating it
  # here keeps PR/branch builds green, incl. Dependabot/fork PRs that have
  # no access to the registry secrets.
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
  # The newest MariaDB version label: the single source of truth for which release
  # gets the `latest` tag. Bump this when releasing a new newest version.
  LATEST_VERSION: "12"


# Third-party actions are SHA-pinned (with version comment) to defend
# against tag-move attacks on a compromised action repo. GitHub-owned
# actions/* are pinned by major - they're considered trusted. Dependabot
# (.github/dependabot.yml) bumps the pins (SHA + comment) automatically.
jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      # Lets the attest-build-provenance / attest steps write attestations.
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Determine which MariaDB version to build, as a "version label" that is both
      # the published Docker tag and the `mariadb:<label>` base image:
      #   - tag push (v12.0.0)        -> the tag's major (12)
      #   - manual run with an input  -> that input
      #   - branch push / PR          -> LATEST_VERSION (build the newest)
      # MariaDB's published lines are bare majors (10, 11, 12); each moving tag
      # tracks the newest release of that series (10 -> 10.11 LTS, 11 -> 11.8 LTS,
      # 12 -> newest). The label drives the build-arg, the published tag, and the
      # platform set.
      - name: Determine MariaDB version
        id: myver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.mariadb_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            label="$INPUT_VERSION"
          elif [ "$REF_TYPE" = "tag" ]; then
            ver="${REF_NAME#v}"          # v12.0.0 -> 12.0.0
            label="${ver%%.*}"           # 12
          else
            label="$LATEST_VERSION"
          fi
          # Validate: digits with at most one dot (guards the mariadb:<label> base
          # image ref and the published tag against bad input / injection). Releases
          # use a bare major; a dotted minor (e.g. 11.4) is allowed for manual
          # smoke-test builds only.
          case "$label" in
            ''|*[!0-9.]*|*.*.*) echo "::error::invalid MariaDB version label: '$label'"; exit 1 ;;
          esac
          # All published MariaDB lines (10, 11, 12) ship amd64 + arm64.
          platforms="linux/amd64,linux/arm64"
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"
          echo "Building MariaDB version: ${label} (platforms: ${platforms})"

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      # Pinned to v3 (cosign v2.x) so we get the current Sigstore TUF root.
      - name: Install cosign
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          platforms: linux/amd64,linux/arm64

      # Login against Docker Hub
      # https://github.com/docker/login-action
      - name: Log into Docker Hub
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Login against GitHub Container Registry
      - name: Log into GHCR
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          # Never auto-assign `latest`; emit our computed label and (for the
          # newest version only) `latest` explicitly below. We drive the tags
          # from the version-label step so republishing an older line can never
          # steal `latest`.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.myver.outputs.label }},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.myver.outputs.label == env.LATEST_VERSION }}
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          build-args: |
            MARIADB_VERSION=${{ steps.myver.outputs.label }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.myver.outputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # Sign the resulting Docker image digest except on PRs.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        # cosign v2 keyless signing uses the GHA OIDC token automatically
        # (no COSIGN_EXPERIMENTAL needed). --yes skips v2's interactive
        # confirmation prompt, which would otherwise hang in CI.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "$TAGS" | xargs -I {} cosign sign --yes {}@"$DIGEST"

      # SLSA build provenance, attached to the pushed image as an OCI referrer.
      # Same digest across registries, so the two steps differ only in
      # subject-name. Attests an already-pushed digest; also recorded in the
      # GitHub attestation store.
      - name: Attest provenance (Docker Hub)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      - name: Attest provenance (GHCR)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      # SPDX SBOM, attested to each registry as an OCI referrer.
      - name: Generate SBOM
        if: ${{ env.IS_RELEASE == 'true' }}
        # Strip per-file metadata: syft's default file cataloging records
        # per-file digests/metadata for every file, which on larger images pushes
        # the SPDX past actions/attest's 16 MiB predicate limit. Keeps the package
        # inventory (what vuln scanners consume) and drops the heavy per-file data.
        env:
          SYFT_FILE_METADATA_SELECTION: none
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Unified actions/attest (actions/attest-sbom is deprecated).
      - name: Attest SBOM (Docker Hub)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          predicate-type: https://spdx.dev/Document
          predicate-path: sbom.spdx.json
          push-to-registry: true

      - name: Attest SBOM (GHCR)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          predicate-type: https://spdx.dev/Document
          predicate-path: sbom.spdx.json
          push-to-registry: true

      # Independently verify what we just pushed (a green attest step means
      # "uploaded", not "verifiable"). GitHub's store is the hard gate; the
      # registry referrer (Scout-facing) is retried to absorb post-push lag.
      - name: Verify attestations
        if: ${{ env.IS_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          set -euo pipefail
          SPDX=https://spdx.dev/Document
          retry() { local n=0; until "$@"; do n=$((n+1)); [ "$n" -ge 5 ] && return 1; echo "not ready (attempt $n), retrying..."; sleep 6; done; }
          for reg in "$REGISTRY_DOCKERHUB" "$REGISTRY_GHCR"; do
            ref="oci://$reg/${IMAGE_NAME}@${DIGEST}"
            echo "::group::verify $ref"
            gh attestation verify "$ref" --repo "$IMAGE_NAME"
            gh attestation verify "$ref" --repo "$IMAGE_NAME" --predicate-type "$SPDX"
            retry gh attestation verify "$ref" --repo "$IMAGE_NAME" --bundle-from-oci
            retry gh attestation verify "$ref" --repo "$IMAGE_NAME" --bundle-from-oci --predicate-type "$SPDX"
            echo "::endgroup::"
          done
          echo "All attestations verified (provenance + SBOM, store + referrer) on both registries."

      # Sync this repo's README to the Docker Hub repository's full description
      # on release (cosmetic; the image is already published above). The curated
      # short description is left untouched (no short-description input).
      # continue-on-error: a description-API failure (e.g. DOCKER_PASSWORD is a
      # PAT lacking description-write scope) must never fail a release that has
      # already pushed the image; check the first release's logs to confirm sync.
      - name: Sync README to Docker Hub description
        if: ${{ env.IS_RELEASE == 'true' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa  # v5.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ github.repository }}
